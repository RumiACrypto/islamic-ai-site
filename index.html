<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Muslim AI - Islamic AI Assistant for Questions, Homework & Guidance</title>
<meta name="description" content="Muslim AI is a free AI chatbot that answers questions, helps with homework, and gives guidance from an Islamic perspective, referencing the Quran and Hadith." />
<meta name="keywords" content="muslim ai, islamic ai, islamic chatbot, quran ai, hadith ai, islamic assistant" />

<!-- These tags control how the link looks when shared on social media or messaging apps -->
<meta property="og:title" content="Muslim AI - Islamic AI Assistant" />
<meta property="og:description" content="A free AI chatbot that answers everyday questions and homework help from an Islamic perspective." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:      #1B1E2B;
    --blue:     #8493D6;
    --blue-deep: #2B3A67;
    --blue-soft: #AEB9E6;
    --bg:       #F3F5FC;
    --bg-dim:   #E4E9F7;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Patrick Hand', -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
  }

  .app {
    width: 100%;
    height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- Header ---------- */
  .header {
    background: var(--blue-deep);
    color: var(--bg);
    padding: 18px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    border-bottom: 2px solid var(--blue);
  }
  .header-title {
    font-family: 'Patrick Hand', Georgia, serif;
    font-size: 21px;
    font-weight: 600;
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .header-title .crescent {
    color: var(--blue-soft);
    font-size: 19px;
  }
  /* Thin repeating geometric motif under the header — the page's one
     decorative signature, echoing tile borders without being literal */
  .header::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 5px;
    background: repeating-linear-gradient(
      45deg,
      var(--blue) 0 4px,
      transparent 4px 9px
    );
    opacity: 0.55;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .user-label {
    font-size: 12px;
    font-weight: 400;
    opacity: 0.8;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .clear-btn {
    background: rgba(247,243,232,0.12);
    border: 1px solid rgba(247,243,232,0.25);
    color: var(--bg);
    font-family: 'Patrick Hand', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    padding: 7px 13px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .clear-btn:hover {
    background: rgba(247,243,232,0.22);
  }

  /* ---------- Messages ---------- */
  .messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    background: var(--bg);
  }
  .msg {
    max-width: min(78%, 600px);
    align-self: flex-start;
    padding: 11px 15px;
    border-radius: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    font-size: 16px;
  }
  .msg img {
    max-width: 100%;
    border-radius: 10px;
    margin-top: 8px;
    display: block;
  }
  .user {
    align-self: flex-end;
    background: var(--blue);
    color: var(--ink);
    border-bottom-right-radius: 4px;
  }
  .bot {
    align-self: flex-start;
    background: var(--blue);
    color: var(--ink);
    border: 1px solid rgba(43,58,103,0.15);
    border-bottom-left-radius: 4px;
  }

  /* ---------- Input row ---------- */
  .input-bar {
    border-top: 1px solid rgba(28,27,25,0.08);
    background: var(--bg);
    display: flex;
    justify-content: center;
  }
  .input-row-wrap {
    width: 100%;
    max-width: 680px;
  }
  .input-row {
    display: flex;
    padding: 14px 20px;
    gap: 9px;
    align-items: center;
    width: 100%;
  }
  input[type="text"] {
    flex: 1;
    padding: 13px 16px;
    border-radius: 11px;
    border: 1.5px solid rgba(28,27,25,0.15);
    font-size: 16px;
    font-family: 'Patrick Hand', sans-serif;
    background: white;
    color: var(--ink);
  }
  input[type="text"]:focus {
    outline: none;
    border-color: var(--blue-deep);
  }
  button {
    background: var(--blue-deep);
    color: var(--bg);
    border: none;
    padding: 13px 20px;
    border-radius: 11px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    font-family: 'Patrick Hand', sans-serif;
    transition: background 0.15s ease;
  }
  button:hover:not(:disabled) {
    background: var(--blue-deep);
  }
  button:disabled {
    opacity: 0.55;
    cursor: default;
  }
  .icon-btn {
    background: var(--bg-dim);
    color: var(--blue-deep);
    padding: 11px 13px;
    font-size: 18px;
    line-height: 1;
  }
  .icon-btn:hover:not(:disabled) {
    background: var(--blue-soft);
  }
  #imageInput {
    display: none;
  }
  .preview-row {
    padding: 0 20px;
    display: none;
    background: var(--bg);
  }
  .preview-row.active {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-top: 12px;
  }
  .preview-row img {
    height: 52px;
    border-radius: 8px;
  }
  .preview-row .remove {
    background: var(--bg-dim);
    color: var(--ink);
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    cursor: pointer;
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <span class="header-title"><span class="crescent">🌙</span> Muslim AI</span>
    <div class="header-actions">
      <span id="userLabel" class="user-label"></span>
      <button class="clear-btn" id="authBtn">Sign in with Google</button>
      <button class="clear-btn" id="clearBtn">Clear chat</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>

  <div class="input-bar">
    <div class="input-row-wrap">
      <div class="preview-row" id="previewRow">
        <img id="previewImg" src="" alt="preview" />
        <button class="remove" id="removePreview">✕</button>
      </div>

      <div class="input-row">
        <input type="file" id="imageInput" accept="image/*" />
        <button class="icon-btn" id="attachBtn" title="Attach an image">📎</button>
        <input id="userInput" type="text" placeholder="Type your question..." />
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Supabase JS library, loaded from their public CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
  // ---------- Supabase setup ----------
  // These two values are safe to be public (they only allow what your
  // database policies permit — see the RLS policies we set up).
  const SUPABASE_URL = 'https://olbnswevqtekrvclxbwr.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_-YCRQq7oGvMpJcjZQNbq5A_ehnjP-Mj';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const clearBtn = document.getElementById('clearBtn');
  const authBtn = document.getElementById('authBtn');
  const userLabel = document.getElementById('userLabel');
  const attachBtn = document.getElementById('attachBtn');
  const imageInput = document.getElementById('imageInput');
  const previewRow = document.getElementById('previewRow');
  const previewImg = document.getElementById('previewImg');
  const removePreview = document.getElementById('removePreview');

  const GUEST_STORAGE_KEY = 'muslimai_chat_history_guest';
  const WELCOME_MSG = "Assalamualaikum, I am a muslim AI made to answer your questions in an islamic point of view when needed but I am here for any other questions as well!";

  let history = [];            // sent to the AI (text + image data)
  let pendingImageData = null; // base64 image waiting to be sent
  let currentUser = null;      // Supabase user object, or null if signed out

  // ---------- Auth ----------
  async function refreshAuthUI() {
    const { data } = await supabaseClient.auth.getUser();
    currentUser = data?.user || null;

    if (currentUser) {
      authBtn.textContent = 'Sign out';
      userLabel.textContent = currentUser.email || '';
    } else {
      authBtn.textContent = 'Sign in with Google';
      userLabel.textContent = '';
    }
  }

  authBtn.addEventListener('click', async () => {
    if (currentUser) {
      await supabaseClient.auth.signOut();
      currentUser = null;
      await refreshAuthUI();
      messagesEl.innerHTML = '';
      loadGuestHistory();
    } else {
      // Redirects to Google, then back to this same page once signed in
      await supabaseClient.auth.signInWithOAuth({ provider: 'google' });
    }
  });

  // ---------- Persistence ----------

  // Guest mode (not signed in): keep it simple, just this browser
  function saveGuestHistory() {
    try {
      localStorage.setItem(GUEST_STORAGE_KEY, JSON.stringify(history));
    } catch (e) {
      console.error('Could not save guest history:', e);
    }
  }

  function loadGuestHistory() {
    try {
      const saved = localStorage.getItem(GUEST_STORAGE_KEY);
      if (saved) {
        history = JSON.parse(saved);
        history.forEach(renderStoredMessage);
        return;
      }
    } catch (e) {
      console.error('Could not load guest history:', e);
    }
    history = [];
    addMessage(WELCOME_MSG, 'bot');
  }

  // Signed in: load from Supabase, save each message as it's sent
  async function loadAccountHistory() {
    history = [];
    messagesEl.innerHTML = '';

    const { data, error } = await supabaseClient
      .from('messages')
      .select('role, content')
      .order('created_at', { ascending: true });

    if (error) {
      console.error('Could not load account history:', error);
      addMessage('Could not load your saved history. Starting fresh.', 'bot');
      return;
    }

    if (!data || data.length === 0) {
      addMessage(WELCOME_MSG, 'bot');
      return;
    }

    data.forEach(row => {
      // content is stored as plain text in the database; image attachments
      // are only kept for the current session, not persisted long-term.
      history.push({ role: row.role, content: row.content, displayText: row.content });
      renderStoredMessage({ role: row.role, content: row.content, displayText: row.content });
    });
  }

  async function saveMessageToAccount(role, content) {
    if (!currentUser) return;
    const { error } = await supabaseClient
      .from('messages')
      .insert({ user_id: currentUser.id, role, content: typeof content === 'string' ? content : JSON.stringify(content) });
    if (error) console.error('Could not save message:', error);
  }

  function renderStoredMessage(entry) {
    if (entry.role === 'user') {
      addMessage(entry.displayText || entry.content, 'user', entry.imagePreview);
    } else if (entry.role === 'assistant') {
      addMessage(entry.content, 'bot');
    }
  }

  // ---------- UI rendering ----------
  function addMessage(text, sender, imageSrc) {
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    if (text) {
      const p = document.createElement('div');
      p.textContent = text;
      div.appendChild(p);
    }
    if (imageSrc) {
      const img = document.createElement('img');
      img.src = imageSrc;
      div.appendChild(img);
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  // ---------- Image attach ----------
  attachBtn.addEventListener('click', () => imageInput.click());

  imageInput.addEventListener('change', () => {
    const file = imageInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      pendingImageData = reader.result; // data:image/...;base64,....
      previewImg.src = pendingImageData;
      previewRow.classList.add('active');
    };
    reader.readAsDataURL(file);
  });

  removePreview.addEventListener('click', () => {
    pendingImageData = null;
    imageInput.value = '';
    previewRow.classList.remove('active');
  });

  // ---------- Sending ----------
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text && !pendingImageData) return;

    const imageToSend = pendingImageData;
    addMessage(text, 'user', imageToSend);

    let messageForAI;
    if (imageToSend) {
      messageForAI = {
        role: 'user',
        content: [
          { type: 'text', text: text || 'What do you see in this image?' },
          { type: 'image_url', image_url: { url: imageToSend } }
        ]
      };
    } else {
      messageForAI = { role: 'user', content: text };
    }

    history.push({
      role: 'user',
      content: messageForAI.content,
      displayText: text,
      imagePreview: imageToSend || null
    });

    if (currentUser) {
      saveMessageToAccount('user', text || '[image attached]');
    } else {
      saveGuestHistory();
    }

    inputEl.value = '';
    pendingImageData = null;
    imageInput.value = '';
    previewRow.classList.remove('active');
    sendBtn.disabled = true;

    const thinkingBubble = addMessage('Thinking...', 'bot');

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history.map(h => ({ role: h.role, content: h.content })) })
      });

      const data = await response.json();

      if (data.reply) {
        thinkingBubble.querySelector('div').textContent = data.reply;
        history.push({ role: 'assistant', content: data.reply });

        if (currentUser) {
          saveMessageToAccount('assistant', data.reply);
        } else {
          saveGuestHistory();
        }
      } else {
        thinkingBubble.querySelector('div').textContent = data.error
          ? 'Sorry, something went wrong: ' + data.error
          : 'Sorry, something went wrong. Please try again.';
      }
    } catch (err) {
      thinkingBubble.querySelector('div').textContent = 'Network error. Please try again.';
    }

    sendBtn.disabled = false;
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  clearBtn.addEventListener('click', async () => {
    if (!confirm('Clear your chat history? This cannot be undone.')) return;

    if (currentUser) {
      const { error } = await supabaseClient.from('messages').delete().eq('user_id', currentUser.id);
      if (error) console.error('Could not clear account history:', error);
    } else {
      localStorage.removeItem(GUEST_STORAGE_KEY);
    }

    history = [];
    messagesEl.innerHTML = '';
    addMessage(WELCOME_MSG, 'bot');
  });

  // ---------- Init ----------
  async function init() {
    await refreshAuthUI();
    if (currentUser) {
      await loadAccountHistory();
    } else {
      loadGuestHistory();
    }
  }

  // Re-check auth state whenever Supabase reports a change
  // (e.g. right after the Google sign-in redirect completes)
  supabaseClient.auth.onAuthStateChange(async (_event, _session) => {
    await refreshAuthUI();
    if (currentUser) {
      await loadAccountHistory();
    }
  });

  init();
</script>

</body>
</html>
